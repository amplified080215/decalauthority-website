<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Decal Authority | Brand Execution Systems</title>
<meta name="description" content="Decal Authority is a Bulacan-based brand execution company for fleet branding, facility branding, large-format production, and corporate visual implementation." />
<style>
:root{
  --navy:#111b47;
  --yellow:#f5c400;
  --text:#111827;
  --line:#d7d9df;
  --white:#ffffff;
}

*{ box-sizing:border-box; margin:0; padding:0; }
html, body{ width:100%; height:100%; }
body{
  font-family:"Segoe UI", Arial, sans-serif;
  background:var(--white);
  color:var(--navy);
  overflow-x:hidden;
}

.hero{
  height:100svh;
  min-height:560px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px 24px;
  background:#fff;
  overflow:hidden;
}

.hero-inner{
  width:min(1180px, 100%);
  height:100%;
  max-height:760px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:12px;
}

.brand-logo{
  width:clamp(120px, 9vw, 170px);
  height:auto;
  display:block;
  margin:0 auto;
}

.kicker{
  font-size:clamp(12px, .95vw, 15px);
  letter-spacing:clamp(5px, .55vw, 10px);
  text-transform:uppercase;
  font-weight:500;
  color:var(--navy);
  margin-top:clamp(18px, 4vh, 44px);
}

.headline{
  font-size:clamp(48px, 5.8vw, 86px);
  line-height:.95;
  letter-spacing:clamp(1px, .16vw, 3px);
  text-transform:uppercase;
  font-weight:900;
  color:var(--navy);
  margin-top:8px;
}

.yellow-dot{ color:var(--yellow); }

.accent-line{
  width:72px;
  height:4px;
  border-radius:100px;
  background:var(--yellow);
  margin-top:4px;
}

.focus-line{
  display:flex;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
  gap:14px;
  color:var(--navy);
  font-size:clamp(12px, .92vw, 15px);
  letter-spacing:clamp(4px, .4vw, 7px);
  text-transform:uppercase;
  margin-top:4px;
}

.focus-line .bullet{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--yellow);
  display:inline-block;
}

.executed-title{
  font-size:clamp(12px, .82vw, 14px);
  letter-spacing:clamp(4px, .4vw, 7px);
  text-transform:uppercase;
  font-weight:800;
  color:var(--navy);
  margin-top:10px;
}

.logo-row{
  width:min(1160px, 100%);
  display:grid;
  grid-template-columns:repeat(8, minmax(0, 1fr));
  align-items:center;
  gap:0;
  margin-top:4px;
}

.client-logo{
  height:74px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 16px;
  position:relative;
}

.client-logo:not(:last-child)::after{
  content:"";
  position:absolute;
  right:0;
  width:1px;
  height:46%;
  background:var(--line);
}

.client-logo img{
  width:100%;
  height:64px;
  max-width:190px;
  object-fit:contain;
  filter:grayscale(1);
  opacity:.92;
}

.actions{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  gap:16px;
  margin-top:10px;
}

.btn{
  min-width:260px;
  height:58px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:0 28px;
  border-radius:6px;
  text-decoration:none;
  letter-spacing:.04em;
  font-size:15px;
  font-weight:800;
  transition:transform .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease;
}

.btn:hover{ transform:translateY(-2px); }
.btn-primary{
  background:var(--yellow);
  color:#111;
  border:2px solid var(--yellow);
  box-shadow:0 12px 30px rgba(245,196,0,.2);
}
.btn-outline{
  background:#fff;
  color:#111;
  border:2px solid #111;
}
.btn-outline:hover{ background:#111; color:#fff; }

@media(max-width:980px){
  .hero{ height:auto; min-height:100svh; overflow:visible; }
  .hero-inner{ height:auto; max-height:none; }
  .headline{ font-size:clamp(44px, 10vw, 78px); }
  .logo-row{ grid-template-columns:repeat(4, minmax(0, 1fr)); row-gap:10px; }
  .client-logo:nth-child(4)::after{ display:none; }
  .client-logo img{ height:56px; max-width:180px; }
}

@media(max-width:620px){
  .hero{ padding:24px 16px; min-height:100svh; }
  .hero-inner{ gap:12px; }
  .brand-logo{ width:130px; }
  .kicker{ letter-spacing:5px; line-height:1.5; margin-top:10px; }
  .headline{ font-size:clamp(38px, 12.5vw, 58px); letter-spacing:1px; }
  .focus-line{ flex-direction:column; gap:8px; letter-spacing:4px; }
  .focus-line .bullet{ display:none; }
  .logo-row{ grid-template-columns:repeat(2, minmax(0, 1fr)); row-gap:8px; }
  .client-logo{ height:52px; }
  .client-logo::after{ display:none !important; }
  .client-logo img{ height:38px; max-width:150px; }
  .actions{ width:100%; gap:12px; }
  .btn{ width:100%; max-width:360px; min-width:0; height:56px; }
}

@media(max-height:760px) and (min-width:981px){
  .hero{ min-height:560px; }
  .hero-inner{ gap:9px; max-height:700px; }
  .brand-logo{ width:125px; }
  .kicker{ margin-top:28px; }
  .headline{ font-size:clamp(46px, 5.2vw, 74px); margin-top:4px; }
  .client-logo{ height:64px; }
  .client-logo img{ height:58px; }
  .btn{ height:52px; }
}
</style>
</head>
<body>

<main class="hero" aria-label="Decal Authority landing page">
  <section class="hero-inner">

    <div>
      <img class="brand-logo" src="brand.svg" alt="Decal Authority">
      <div class="kicker">Brand Execution Systems</div>
    </div>

    <h1 class="headline">Brand Standards,<br>Executed<span class="yellow-dot">.</span></h1>

    <div class="accent-line" aria-hidden="true"></div>

    <div class="focus-line" aria-label="Service focus">
      <span>Corporate</span>
      <span class="bullet" aria-hidden="true"></span>
      <span>Industrial</span>
      <span class="bullet" aria-hidden="true"></span>
      <span>Multi-Site Deployments</span>
    </div>

    <div class="executed-title">Executed For</div>

    <div class="logo-row" aria-label="Selected client brands">
      <div class="client-logo"><img src="logo1.svg" alt="Vista Land"></div>
      <div class="client-logo"><img src="logo2.svg" alt="Eagle Cement"></div>
      <div class="client-logo"><img src="logo3.svg" alt="O!Save Trading"></div>
      <div class="client-logo"><img src="logo4.svg" alt="CEVA Logistics"></div>
      <div class="client-logo"><img src="logo5.svg" alt="Bollore Logistics"></div>
      <div class="client-logo"><img src="logo6.svg" alt="Trends Group"></div>
      <div class="client-logo"><img src="logo7.svg" alt="Supremacy International"></div>
      <div class="client-logo"><img src="logo8.svg" alt="Schneider Electric"></div>
    </div>

    <div class="actions">
      <a class="btn btn-primary" href="profile.pdf" target="_blank" rel="noopener">▣ Download Company Profile</a>
      <a class="btn btn-outline" href="mailto:info@decalauthority.ph?subject=Project%20Inquiry%20-%20Decal%20Authority">Get a Quote →</a>
    </div>

  </section>
</main>

</body>
</html>
