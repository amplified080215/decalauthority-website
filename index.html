<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Decal Authority</title>
  <meta name="description" content="Decal Authority is a Bulacan-based brand execution company for fleet branding, facility branding, large-format production, and corporate visual implementation."> <link rel="icon" type="image/svg+xml" href="favicon.svg">

<style>
:root{
  --navy:#101b46;
  --yellow:#f6c400;
  --gray:#6f6f6f;
  --light:#ffffff;
  --line:#d9d9d9;
  --black:#111111;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:"Segoe UI", Arial, sans-serif;
  background:#ffffff;
  color:var(--navy);
  min-height:100vh;
}

.page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:48px 22px;
  background:
    radial-gradient(circle at top, #ffffff 0%, #ffffff 48%, #fafafa 100%);
}

.hero{
  width:100%;
  max-width:1120px;
  text-align:center;
}

.logo-wrap{
  margin-bottom:34px;
}

.logo{
  width:260px;
  max-width:70vw;
  height:auto;
}

.kicker{
  font-size:15px;
  letter-spacing:12px;
  text-transform:uppercase;
  color:var(--navy);
  margin-bottom:88px;
  font-weight:500;
}

.headline{
  font-size:clamp(46px, 9vw, 96px);
  line-height:.98;
  letter-spacing:3px;
  text-transform:uppercase;
  font-weight:900;
  color:var(--navy);
  margin-bottom:42px;
}

.yellow-dot{
  color:var(--yellow);
}

.divider{
  width:72px;
  height:4px;
  background:var(--yellow);
  margin:0 auto 34px;
  border-radius:100px;
}

.segments{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:18px;
  flex-wrap:wrap;
  margin-bottom:90px;
  color:#202020;
  font-size:15px;
  letter-spacing:8px;
  text-transform:uppercase;
}

.segment-dot{
  width:7px;
  height:7px;
  background:var(--yellow);
  border-radius:50%;
  display:inline-block;
}

.executed{
  margin-bottom:58px;
}

.executed-label{
  font-size:13px;
  letter-spacing:6px;
  text-transform:uppercase;
  color:#333;
  margin-bottom:24px;
  font-weight:700;
}

.logo-grid{
  display:grid;
  grid-template-columns:repeat(8, 1fr);
  gap:0;
  align-items:center;
  border-top:0;
  max-width:980px;
  margin:0 auto;
}

.client-logo{
  min-height:68px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:8px 18px;
  border-right:1px solid var(--line);
}

.client-logo:last-child{
  border-right:none;
}

.client-logo img{
  width:100%;
  max-width:120px;
  max-height:54px;
  object-fit:contain;
  filter:grayscale(1);
  opacity:.72;
}

.actions{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:28px;
  flex-wrap:wrap;
}

.btn{
  min-width:260px;
  height:68px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  text-decoration:none;
  text-transform:uppercase;
  letter-spacing:1px;
  font-size:14px;
  font-weight:800;
  border-radius:4px;
  transition:.2s ease;
}

.btn-primary{
  background:var(--yellow);
  color:#111;
  border:2px solid var(--yellow);
  box-shadow:0 12px 28px rgba(246,196,0,.22);
}

.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 16px 36px rgba(246,196,0,.3);
}

.btn-outline{
  background:#fff;
  color:#111;
  border:2px solid #111;
}

.btn-outline:hover{
  transform:translateY(-2px);
  background:#111;
  color:#fff;
}

.icon{
  font-size:22px;
  line-height:1;
}

.footer-note{
  margin-top:42px;
  font-size:13px;
  color:#777;
  letter-spacing:1px;
}

@media(max-width:900px){
  .page{
    padding:42px 18px;
  }

  .kicker{
    letter-spacing:8px;
    margin-bottom:72px;
  }

  .segments{
    letter-spacing:5px;
    margin-bottom:70px;
  }

  .logo-grid{
    grid-template-columns:repeat(4, 1fr);
    row-gap:18px;
  }

  .client-logo:nth-child(4){
    border-right:none;
  }
}

@media(max-width:620px){
  .page{
    align-items:flex-start;
    padding-top:56px;
  }

  .logo{
    width:220px;
  }

  .logo-wrap{
    margin-bottom:28px;
  }

  .kicker{
    font-size:12px;
    letter-spacing:5px;
    margin-bottom:56px;
  }

  .headline{
    font-size:clamp(42px, 14vw, 64px);
    letter-spacing:1px;
  }

  .segments{
    flex-direction:column;
    gap:10px;
    letter-spacing:4px;
    font-size:12px;
    margin-bottom:58px;
  }

  .segment-dot{
    display:none;
  }

  .logo-grid{
    grid-template-columns:repeat(2, 1fr);
    gap:18px 0;
  }

  .client-logo{
    border-right:none;
    min-height:58px;
  }

  .client-logo img{
    max-width:118px;
    max-height:48px;
  }

  .actions{
    gap:14px;
  }

  .btn{
    width:100%;
    max-width:340px;
    min-width:unset;
    height:62px;
  }
}

@media(max-height:760px) and (min-width:900px){
  .page{
    padding-top:32px;
    padding-bottom:32px;
  }

  .logo{
    width:220px;
  }

  .kicker{
    margin-bottom:46px;
  }

  .headline{
    font-size:72px;
  }

  .segments{
    margin-bottom:48px;
  }

  .executed{
    margin-bottom:38px;
  }
}
</style>
</head>

<body>

<main class="page">

  <section class="hero" aria-label="Decal Authority Landing Page">

    <div class="logo-wrap">
      <img class="logo" src="brand.svg" alt="Decal Authority logo">
    </div>

    <div class="kicker">
      Brand Execution Systems
    </div>

    <h1 class="headline">
      Brand Standards,<br>
      Executed<span class="yellow-dot">.</span>
    </h1>

    <div class="divider"></div>

    <div class="segments" aria-label="Service focus">
      <span>Corporate</span>
      <span class="segment-dot"></span>
      <span>Industrial</span>
      <span class="segment-dot"></span>
      <span>Multi-Site Deployments</span>
    </div>

    <div class="executed">

      <div class="executed-label">
        Executed For
      </div>

      <div class="logo-grid" aria-label="Selected executed brands">

        <div class="client-logo">
          <img src="logo1.svg" alt="Client logo 1">
        </div>

        <div class="client-logo">
          <img src="logo2.svg" alt="Client logo 2">
        </div>

        <div class="client-logo">
          <img src="logo3.svg" alt="Client logo 3">
        </div>

        <div class="client-logo">
          <img src="logo4.svg" alt="Client logo 4">
        </div>

        <div class="client-logo">
          <img src="logo5.svg" alt="Client logo 5">
        </div>

        <div class="client-logo">
          <img src="logo6.svg" alt="Client logo 6">
        </div>

        <div class="client-logo">
          <img src="logo7.svg" alt="Client logo 7">
        </div>

        <div class="client-logo">
          <img src="logo8.svg" alt="Client logo 8">
        </div>

      </div>

    </div>

    <div class="actions">

      <a class="btn btn-primary" href="profile.pdf" target="_blank" rel="noopener">
        <span class="icon">▣</span>
        Download Company Profile
      </a>

      <a class="btn btn-outline" href="mailto:info@decalauthority.ph?subject=Project%20Inquiry%20-%20Decal%20Authority">
        Get A Quote
        <span class="icon">→</span>
      </a>

    </div>

    <div class="footer-note">
      Fleet Branding · Facility Branding · Large Format Production · Brand Compliance Execution
    </div>

  </section>

</main>

</body>
</html>
