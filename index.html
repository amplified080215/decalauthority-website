<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decal Authority | Brand Execution Systems</title>
<meta name="description" content="Decal Authority is a Bulacan-based brand execution company for fleet branding, facility branding, large-format production, and corporate visual implementation.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<style>
:root{
  --navy:#101b46;
  --yellow:#f6c400;
  --line:#d8dce8;
  --white:#ffffff;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,
body{
  width:100%;
  min-height:100%;
}

body{
  font-family:"Segoe UI", Arial, sans-serif;
  background:#ffffff;
  color:var(--navy);
  overflow-x:hidden;
}

.hero{
  width:100%;
  min-height:100vh;
  min-height:100svh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:38px 28px;
  background:#ffffff;
}

.hero-inner{
  width:min(1240px,100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:32px;
  text-align:center;
}

.top-lockup{
  width:100%;
  display:grid;
  grid-template-columns:0.9fr auto 1.1fr;
  align-items:center;
  gap:48px;
}

.brand-panel{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:22px;
}

.brand-logo{
  width:clamp(220px,16vw,310px);
  height:auto;
  display:block;
}

.kicker{
  font-size:clamp(12px,.82vw,15px);
  letter-spacing:clamp(5px,.45vw,8px);
  text-transform:uppercase;
  font-weight:800;
  color:var(--navy);
  white-space:nowrap;
}

.vertical-divider{
  width:3px;
  height:150px;
  background:var(--yellow);
  border-radius:999px;
}

.headline-panel{
  display:flex;
  align-items:center;
  justify-content:center;
}

.headline{
  color:var(--navy);
  text-transform:uppercase;
  font-weight:900;
  line-height:.94;
  letter-spacing:.5px;
  font-size:clamp(42px,4.6vw,74px);
}

.headline .line{
  display:block;
  white-space:nowrap;
}

.period{
  color:var(--yellow);
}

.lower-content{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
}

.focus-line{
  display:flex;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
  gap:14px;
  color:var(--navy);
  font-size:clamp(11px,.72vw,14px);
  letter-spacing:clamp(3.5px,.32vw,6px);
  text-transform:uppercase;
}

.focus-line .bullet{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--yellow);
  display:inline-block;
}

.executed-title{
  font-size:clamp(11px,.72vw,14px);
  letter-spacing:clamp(4px,.35vw,7px);
  text-transform:uppercase;
  font-weight:900;
  color:var(--navy);
}

.logo-row{
  width:min(1120px,100%);
  display:grid;
  grid-template-columns:repeat(8,minmax(0,1fr));
  align-items:center;
  justify-items:center;
  gap:0;
  margin-top:2px;
}

.client-logo{
  min-height:70px;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:4px 20px;
  position:relative;
}

.client-logo:not(:last-child)::after{
  content:"";
  position:absolute;
  right:0;
  top:50%;
  transform:translateY(-50%);
  width:1px;
  height:48px;
  background:rgba(16,27,70,.18);
}

.client-logo img{
  display:block;
  max-width:100%;
  width:125px;
  max-height:54px;
  height:auto;
  object-fit:contain;
  filter:grayscale(1);
  opacity:.86;
}

.client-logo:nth-child(1) img{
  width:115px;
}

.client-logo:nth-child(2) img{
  width:125px;
}

.client-logo:nth-child(3) img{
  width:100px;
}

.client-logo:nth-child(4) img{
  width:86px;
}

.client-logo:nth-child(5) img{
  width:130px;
}

.client-logo:nth-child(6) img{
  width:130px;
}

.client-logo:nth-child(7) img{
  width:135px;
}

.client-logo:nth-child(8) img{
  width:145px;
}

.actions{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  gap:22px;
  margin-top:4px;
}

.btn{
  min-width:300px;
  height:58px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:0 28px;
  border-radius:7px;
  text-decoration:none;
  letter-spacing:.03em;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
  position:relative;
  z-index:10;
  transition:transform .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease;
}

.btn:hover{
  transform:translateY(-2px);
}

.btn-primary{
  background:var(--yellow);
  color:#111111;
  border:2px solid var(--yellow);
  box-shadow:0 12px 26px rgba(246,196,0,.2);
}

.btn-outline{
  background:#ffffff;
  color:#111111;
  border:2px solid #111111;
}

.btn-outline:hover{
  background:#111111;
  color:#ffffff;
}

@media(max-width:960px){
  .hero{
    min-height:auto;
    padding:36px 18px;
  }

  .hero-inner{
    gap:24px;
  }

  .top-lockup{
    display:flex;
    flex-direction:column;
    gap:20px;
  }

  .vertical-divider{
    display:none;
  }

  .brand-panel{
    gap:16px;
  }

  .brand-logo{
    width:clamp(165px,28vw,230px);
  }

  .kicker{
    white-space:normal;
  }

  .headline{
    font-size:clamp(42px,8vw,66px);
  }

  .headline .line{
    white-space:normal;
  }

  .logo-row{
    width:100%;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:10px 0;
  }

  .client-logo{
    min-height:58px;
    padding:4px 10px;
  }

  .client-logo:nth-child(4)::after,
  .client-logo:nth-child(8)::after{
    display:none;
  }

  .client-logo img{
    width:110px;
    max-height:46px;
  }
}

@media(max-width:640px){
  .hero{
    padding:34px 16px;
  }

  .hero-inner{
    gap:22px;
  }

  .brand-logo{
    width:155px;
  }

  .kicker{
    letter-spacing:5px;
    line-height:1.45;
  }

  .headline{
    font-size:clamp(38px,11.5vw,56px);
    line-height:.96;
    letter-spacing:.5px;
  }

  .lower-content{
    gap:16px;
  }

  .focus-line{
    flex-direction:column;
    gap:7px;
    letter-spacing:4px;
    line-height:1.5;
  }

  .focus-line .bullet{
    display:none;
  }

  .executed-title{
    letter-spacing:5px;
  }

  .logo-row{
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:10px 0;
  }

  .client-logo{
    min-height:52px;
    padding:4px 10px;
  }

  .client-logo::after{
    display:none !important;
  }

  .client-logo img{
    width:125px;
    max-height:46px;
  }

  .actions{
    width:100%;
    gap:12px;
  }

  .btn{
    width:100%;
    max-width:360px;
    min-width:0;
    height:54px;
  }
}

@media(max-height:780px) and (min-width:961px){
  .hero{
    padding-top:28px;
    padding-bottom:28px;
  }

  .hero-inner{
    gap:24px;
  }

  .brand-logo{
    width:225px;
  }

  .vertical-divider{
    height:125px;
  }

  .headline{
    font-size:clamp(40px,4.25vw,68px);
  }

  .lower-content{
    gap:14px;
  }

  .client-logo{
    min-height:58px;
  }

  .client-logo img{
    max-height:50px;
  }

  .btn{
    height:52px;
  }
}
</style>

</head>

</body>
