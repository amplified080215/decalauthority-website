<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decal Authority</title>

  <style>
    :root{
      --navy:#13204B;
      --yellow:#FCC616;
      --gray:#BABABA;
      --light:#FEFEFE;
      --text:#1a1a1a;
      --line:#d9d9d9;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html, body{
      width:100%;
      height:100%;
      background:#fff;
      font-family:Segoe UI, Arial, sans-serif;
      color:var(--text);
    }

    body{
      overflow-x:hidden;
    }

    .hero{
      min-height:100svh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:#fff;
    }

    .hero-inner{
      width:min(1180px, 100%);
      min-height:calc(100svh - 48px);
      display:grid;
      grid-template-rows:auto auto auto auto auto;
      align-content:center;
      justify-items:center;
      gap:18px;
      text-align:center;
    }

    .brand{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
    }

    .brand img{
      width:clamp(180px, 16vw, 260px);
      height:auto;
      display:block;
    }

    .eyebrow{
      font-size:clamp(12px, 1vw, 16px);
      letter-spacing:.55em;
      color:var(--navy);
      text-transform:uppercase;
      white-space:nowrap;
    }

    .headline{
      font-weight:800;
      color:var(--navy);
      text-transform:uppercase;
      line-height:.95;
      letter-spacing:-0.03em;
      font-size:clamp(54px, 7.3vw, 122px);
      max-width:1000px;
    }

    .headline .dot{
      color:var(--yellow);
    }

    .accent-line{
      width:72px;
      height:4px;
      background:var(--yellow);
      border-radius:99px;
    }

    .subline{
      font-size:clamp(12px, 1vw, 15px);
      letter-spacing:.38em;
      color:var(--navy);
      text-transform:uppercase;
      white-space:nowrap;
    }

    .subline .bullet{
      color:var(--yellow);
      margin:0 .75em;
    }

    .clients-wrap{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      margin-top:6px;
    }

    .clients-title{
      font-size:clamp(12px, .95vw, 14px);
      font-weight:700;
      letter-spacing:.38em;
      color:var(--navy);
      text-transform:uppercase;
    }

    .clients{
      width:100%;
      display:grid;
      grid-template-columns:repeat(8, minmax(0, 1fr));
      align-items:center;
      gap:18px;
    }

    .client{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:56px;
      padding:0 10px;
      position:relative;
    }

    .client:not(:last-child)::after{
      content:"";
      position:absolute;
      right:-9px;
      top:50%;
      transform:translateY(-50%);
      width:1px;
      height:34px;
      background:var(--line);
    }

    .client img{
      max-width:100%;
      width:auto;
      height:clamp(26px, 2.5vw, 40px);
      object-fit:contain;
      filter:grayscale(100%);
      opacity:.9;
      display:block;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:16px;
      margin-top:6px;
      flex-wrap:wrap;
    }

    .button{
      min-width:290px;
      height:64px;
      padding:0 26px;
      border-radius:8px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      text-decoration:none;
      font-weight:700;
      font-size:clamp(15px, 1vw, 18px);
      letter-spacing:.04em;
      transition:.2s ease;
    }

    .button.primary{
      background:var(--yellow);
      color:var(--navy);
      border:2px solid var(--yellow);
    }

    .button.secondary{
      background:#fff;
      color:var(--navy);
      border:2px solid rgba(19,32,75,.35);
    }

    .button:hover{
      transform:translateY(-1px);
    }

    .icon{
      font-size:1.15em;
      line-height:1;
    }

    /* ---------- Tablet ---------- */
    @media (max-width: 1100px){
      .hero-inner{
        gap:16px;
      }

      .clients{
        grid-template-columns:repeat(4, minmax(0, 1fr));
        row-gap:14px;
      }

      .client:nth-child(4)::after{
        display:none;
      }
    }

    /* ---------- Mobile ---------- */
    @media (max-width: 768px){
      .hero{
        padding:20px 16px;
      }

      .hero-inner{
        min-height:auto;
        gap:16px;
      }

      .brand img{
        width:160px;
      }

      .eyebrow{
        letter-spacing:.35em;
        white-space:normal;
      }

      .headline{
        font-size:clamp(40px, 12vw, 72px);
        max-width:100%;
      }

      .subline{
        white-space:normal;
        letter-spacing:.22em;
        line-height:1.6;
      }

      .clients{
        grid-template-columns:repeat(2, minmax(0, 1fr));
        gap:12px 8px;
      }

      .client{
        min-height:44px;
      }

      .client::after{
        display:none !important;
      }

      .client img{
        height:26px;
      }

      .buttons{
        width:100%;
        flex-direction:column;
        align-items:center;
      }

      .button{
        width:100%;
        min-width:0;
        max-width:420px;
        height:58px;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-inner">

      <div class="brand">
        <img src="brand.svg" alt="Decal Authority">
        <div class="eyebrow">Brand Execution Systems</div>
      </div>

      <h1 class="headline">
        Brand Standards,<br>Executed<span class="dot">.</span>
      </h1>

      <div class="accent-line"></div>

      <div class="subline">
        Corporate <span class="bullet">•</span>
        Industrial <span class="bullet">•</span>
        Multi-Site Deployments
      </div>

      <div class="clients-wrap">
        <div class="clients-title">Executed For</div>

        <div class="clients">
          <div class="client"><img src="logo1.svg" alt="Client 1"></div>
          <div class="client"><img src="logo2.svg" alt="Client 2"></div>
          <div class="client"><img src="logo3.svg" alt="Client 3"></div>
          <div class="client"><img src="logo4.svg" alt="Client 4"></div>
          <div class="client"><img src="logo5.svg" alt="Client 5"></div>
          <div class="client"><img src="logo6.svg" alt="Client 6"></div>
          <div class="client"><img src="logo7.svg" alt="Client 7"></div>
          <div class="client"><img src="logo8.svg" alt="Client 8"></div>
        </div>
      </div>

      <div class="buttons">
        <a class="button primary" href="profile.pdf" target="_blank">
          <span class="icon">📄</span>
          Download Company Profile
        </a>

        <a class="button secondary" href="mailto:info@decalauthority.ph">
          Get a Quote <span class="icon">→</span>
        </a>
      </div>

    </div>
  </section>

</body>
</html>
